# Per-file baselines for `cargo run -p xtask -- standards-check`.
#
# Each `[file."<rel-path>"]` table caps the number of violations of each
# predicate for that file. A live count strictly greater than the
# baseline fails CI; missing predicates default to zero (new files
# start clean). Reductions are encouraged in any PR that touches a file;
# raising a number requires a justification in the PR description.
#
# Predicate definitions live in `xtask/src/standards.rs`. AGENTS.md
# §Mechanical enforcement explains what each predicate enforces and how
# to drive its baselines down.

