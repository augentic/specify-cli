[package]
name = "specify-tool"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "WASI tool manifest, cache, resolver, and runner support for Specify"
categories = ["development-tools", "wasm"]
keywords = ["specify", "tools", "wasi", "wasmtime"]
readme = "../../README.md"

[lints]
workspace = true

[features]
default = ["host"]
# Compile the Wasmtime-backed WASI Preview 2 runner. Disable to build the
# manifest, cache, resolver, and validator surface without dragging Wasmtime
# (and its duplicate transitive deps) into the dependency graph; callers get a
# stub `WasiRunner` that returns `tool-host-not-built` at run time.
host = ["dep:wasmtime", "dep:wasmtime-wasi"]
# Compile the wasm-pkg / OCI-backed `PackageClient`. Disable to build without
# `wasm-pkg-client` (and its duplicate `reqwest` / `tokio` / `oci-client` /
# `warg-client` transitive stack); the `package:` source variant still parses,
# but resolution returns the `tool-package-source-disabled` diagnostic.
oci = ["dep:wasm-pkg-client", "dep:tokio", "dep:futures-util"]

[dependencies]
specify-error.workspace = true
wasmtime = { workspace = true, optional = true }
wasmtime-wasi = { workspace = true, optional = true }
ureq.workspace = true
sha2.workspace = true
serde.workspace = true
serde_json.workspace = true
serde-saphyr.workspace = true
jiff.workspace = true
semver.workspace = true
tempfile.workspace = true
thiserror.workspace = true
wasm-pkg-client = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[dev-dependencies]
jsonschema.workspace = true
