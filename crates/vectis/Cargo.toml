[package]
name = "specify-vectis"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Vectis bootstrap CLI for scaffolding and verifying Crux cross-platform projects (RFC-6)"
readme = "../../README.md"
publish = false

[lib]
name = "specify_vectis"
path = "src/lib.rs"

# Standalone Vectis binary (RFC-13 §4.3a). Wraps the library API so the
# Vectis capability can shell out via `specify-vectis <verb>` from skill
# runtimes; the library API stays available for callers that prefer to
# dispatch in-process.
[[bin]]
name = "specify-vectis"
path = "src/bin/specify-vectis.rs"

[lints]
workspace = true

[dependencies]
clap.workspace = true
jsonschema.workspace = true
roxmltree = "0.21"
serde.workspace = true
serde-saphyr.workspace = true
serde_json.workspace = true
syn = { version = "2", features = ["full"] }
thiserror.workspace = true
toml = "1"
ureq = { version = "3", features = ["json"] }

[dev-dependencies]
assert_cmd = "2"
tempfile.workspace = true
