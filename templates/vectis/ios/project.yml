name: __APP_NAME__
packages:
  SharedTypes:
    path: ./generated/SharedTypes
  Shared:
    path: ./generated/Shared
options:
  bundleIdPrefix: com.vectis.__APP_NAME_LOWER__
  deploymentTarget:
    iOS: "17.0"
attributes:
  BuildIndependentTargetsInParallel: true
targets:
  __APP_NAME__:
    type: application
    platform: iOS
    sources:
      - __APP_NAME__
    dependencies:
      - package: SharedTypes
      - package: Shared
    info:
      path: __APP_NAME__/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        CODE_SIGNING_ALLOWED: "NO"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.vectis.__APP_NAME_LOWER__.debug
          OTHER_LDFLAGS: ["-w"]
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.vectis.__APP_NAME_LOWER__
          OTHER_LDFLAGS: ["-w"]
