schema-version: 1

assemblies:
  core:
    path-mode: content-only
    files:
      - source: workspace-cargo.toml
        target: Cargo.toml
      - source: clippy.toml
        target: clippy.toml
      - source: rust-toolchain.toml
        target: rust-toolchain.toml
      - source: gitignore
        target: .gitignore
      - source: shared-cargo.toml
        target: shared/Cargo.toml
      - source: lib.rs
        target: shared/src/lib.rs
      - source: app.rs
        target: shared/src/app.rs
      - source: ffi.rs
        target: shared/src/ffi.rs
      - source: codegen.rs
        target: shared/src/bin/codegen.rs
      - source: deny.toml
        target: deny.toml
      - source: supply-chain-config.toml
        target: supply-chain/config.toml
      - source: supply-chain-audits.toml
        target: supply-chain/audits.toml
      - source: supply-chain-imports.lock
        target: supply-chain/imports.lock

  ios:
    path-mode: app-name
    files:
      - source: project.yml
        target: iOS/project.yml
      - source: Makefile
        target: iOS/Makefile
      - source: App.swift
        target: iOS/__APP_NAME__/__APP_NAME__App.swift
      - source: Core.swift
        target: iOS/__APP_NAME__/Core.swift
      - source: ContentView.swift
        target: iOS/__APP_NAME__/ContentView.swift
      - source: LoadingScreen.swift
        target: iOS/__APP_NAME__/Views/LoadingScreen.swift
      - source: HomeScreen.swift
        target: iOS/__APP_NAME__/Views/HomeScreen.swift
      - source: AppIcon-Contents.json
        target: iOS/__APP_NAME__/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

  android:
    path-mode: android-package
    files:
      - source: Makefile
        target: Android/Makefile
      - source: gitignore
        target: Android/.gitignore
      - source: root-build.gradle.kts
        target: Android/build.gradle.kts
      - source: settings.gradle.kts
        target: Android/settings.gradle.kts
      - source: gradle.properties
        target: Android/gradle.properties
      - source: libs.versions.toml
        target: Android/gradle/libs.versions.toml
      - source: app-build.gradle.kts
        target: Android/app/build.gradle.kts
      - source: shared-build.gradle.kts
        target: Android/shared/build.gradle.kts
      - source: AndroidManifest.xml
        target: Android/app/src/main/AndroidManifest.xml
      - source: themes.xml
        target: Android/app/src/main/res/values/themes.xml
      - source: network-security-config.xml
        target: Android/app/src/main/res/xml/network_security_config.xml
        include-when:
          any-of: [http, sse]
      - source: Application.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/__APP_NAME__Application.kt
      - source: MainActivity.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/MainActivity.kt
      - source: Core.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/core/Core.kt
      - source: LoadingScreen.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/ui/screens/LoadingScreen.kt
      - source: HomeScreen.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/ui/screens/HomeScreen.kt
      - source: Color.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/ui/theme/Color.kt
      - source: Theme.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/ui/theme/Theme.kt
      - source: Type.kt
        target: Android/app/src/main/java/__ANDROID_PACKAGE_PATH__/ui/theme/Type.kt
      - source: ic_launcher.xml
        target: Android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
      - source: ic_launcher_round.xml
        target: Android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
      - source: ic_launcher_foreground.xml
        target: Android/app/src/main/res/drawable/ic_launcher_foreground.xml
      - source: ic_launcher_background.xml
        target: Android/app/src/main/res/values/ic_launcher_background.xml
