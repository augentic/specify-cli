[package]
name = "shared"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
# Internal app crate -- not meant for crates.io. `publish = false`
# also lets `cargo deny` skip the missing-license check via the
# `[licenses] private = { ignore = true }` rule in `deny.toml`. Flip
# to a valid registry + add `license = "..."` if you decide to publish.
publish = false

[lib]
crate-type = ["cdylib", "lib", "staticlib"]

[[bin]]
name = "codegen"
required-features = ["codegen"]

[features]
uniffi = ["dep:uniffi", "dep:thiserror"]
wasm_bindgen = ["dep:wasm-bindgen", "dep:thiserror", "getrandom/wasm_js"]
codegen = [
    "crux_core/cli",
    <<<CAP:http
    "crux_http/facet_typegen",
    CAP:http>>>
    <<<CAP:kv
    "crux_kv/facet_typegen",
    CAP:kv>>>
    "dep:clap",
    "dep:log",
    "dep:pretty_env_logger",
    "uniffi",
]
facet_typegen = [
    "crux_core/facet_typegen",
    <<<CAP:http
    "crux_http/facet_typegen",
    CAP:http>>>
    <<<CAP:kv
    "crux_kv/facet_typegen",
    CAP:kv>>>
]

[dependencies]
crux_core.workspace = true
serde = { workspace = true, features = ["derive"] }
facet.workspace = true
<<<CAP:http
crux_http.workspace = true
url = "2"
CAP:http>>>
<<<CAP:kv
crux_kv.workspace = true
serde_json = "1.0"
CAP:kv>>>
<<<CAP:time
crux_time.workspace = true
CAP:time>>>
<<<CAP:platform
crux_platform.workspace = true
CAP:platform>>>
<<<CAP:sse
async-sse = "5"
futures = "0.3"
CAP:sse>>>

# Optional dependencies (enabled by features above)
clap = { version = "4", optional = true, features = ["derive"] }
getrandom = { version = "0.3", optional = true, default-features = false }
log = { version = "0.4", optional = true }
pretty_env_logger = { version = "0.5", optional = true }
thiserror = { version = "2", optional = true }
uniffi = { version = "__UNIFFI_VERSION__", optional = true }
wasm-bindgen = { version = "0.2", optional = true }

[dev-dependencies]
insta = { version = "1", features = ["yaml"] }

[lints]
workspace = true
