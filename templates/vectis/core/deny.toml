[advisories]
version = 2
yanked = "deny"
# Crux 0.17's transitive deps include a couple of crates the upstream
# maintainers have retired. Neither has a safe upgrade today and they
# are removed via the `template-updater` skill when Crux bumps away
# from them. Listed here explicitly (rather than as a blanket
# `unmaintained = "warn"`) so new advisories still surface as errors.
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error 1.x (via crux_macros -> crux_core)
    "RUSTSEC-2025-0141", # bincode 1.x (via crux_core)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
# `private = { ignore = true }` exempts the workspace's own crates from
# the license check. The scaffolded `shared` crate is internal (not
# published to crates.io) so it ships without a `license = ...` field
# by default -- the user chooses their project's license later.
private = { ignore = true }
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git = "deny"
