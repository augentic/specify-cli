[package]
name = "specify-adapter"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Framework-authoring validator for adapter directories — manifest presence and first-party tool declaration checks (CORE-010, 049)"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities"]
keywords = ["specify", "adapter", "validate", "lint", "framework"]

# Framework/authoring checker run through `specify lint framework`'s
# `kind: tool` evaluator. The published surface is the WASI component; this
# native binary stays available for parity tests and direct local debugging.
[[bin]]
name = "specify-adapter"
path = "src/main.rs"

[lib]
name = "specify_adapter"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde-saphyr.workspace = true
serde_json.workspace = true

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true
