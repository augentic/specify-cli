[package]
name = "specify-scenarios"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Framework-authoring validator for scenario packs — artifact-path, body-id, recorded-trace, stage-contiguity, and catalog↔runs checks (CORE-028, 029, 031, 033, 056)"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities"]
keywords = ["specify", "scenarios", "validate", "lint", "framework"]

# Framework/authoring checker run through `specify lint framework`'s
# `kind: tool` evaluator. The published surface is the WASI component; this
# native binary stays available for parity tests and direct local debugging.
[[bin]]
name = "specify-scenarios"
path = "src/main.rs"

[lib]
name = "specify_scenarios"
path = "src/lib.rs"

[dependencies]
regex = "1"
serde = { workspace = true, features = ["derive"] }
serde-saphyr.workspace = true
serde_json.workspace = true
specify-framework-wire.workspace = true

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true
