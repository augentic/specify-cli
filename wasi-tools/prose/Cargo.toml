[package]
name = "specify-prose"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Framework-authoring validator for documented numeric caps — skill description/body cap drift across schema and standards (CORE-024)"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities"]
keywords = ["specify", "prose", "validate", "lint", "framework"]

# Framework/authoring checker run through `specify lint framework`'s
# `kind: tool` evaluator. The published surface is the WASI component; this
# native binary stays available for parity tests and direct local debugging.
[[bin]]
name = "specify-prose"
path = "src/main.rs"

[lib]
name = "specify_prose"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
specify-framework-wire.workspace = true

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true
