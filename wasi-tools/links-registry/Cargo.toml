[package]
name = "specify-links-registry"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Framework-authoring validator for link registries — brief schema-URL resolution and skill-directive joins (CORE-018, 020)"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities"]
keywords = ["specify", "links", "validate", "lint", "framework"]

# Framework/authoring checker run through `specify lint framework`'s
# `kind: tool` evaluator. The published surface is the WASI component; this
# native binary stays available for parity tests and direct local debugging.
[[bin]]
name = "specify-links-registry"
path = "src/main.rs"

[lib]
name = "specify_links_registry"
path = "src/lib.rs"

[dependencies]
regex = "1"
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
specify-framework-wire.workspace = true

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true
