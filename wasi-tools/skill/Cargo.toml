[package]
name = "specify-skill"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Framework-authoring validator for SKILL.md frontmatter — presence, argument-hint grammar, and description-verb checks (CORE-042, 035, 036)"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities"]
keywords = ["specify", "skill", "validate", "lint", "framework"]

# Framework/authoring checker run through `specify lint framework`'s
# `kind: tool` evaluator. The published surface is the WASI component; this
# native binary stays available for parity tests and direct local debugging.
[[bin]]
name = "specify-skill"
path = "src/main.rs"

[lib]
name = "specify_skill"
path = "src/lib.rs"

[dependencies]
regex = "1"
serde = { workspace = true, features = ["derive"] }
serde-saphyr.workspace = true
serde_json.workspace = true

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true
