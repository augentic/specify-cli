# Install: `cargo install cargo-make`
# Help: https://sagiegurari.github.io/cargo-make/

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
default_to_workspace = true
skip_core_tasks = true
skip_crate_env_info = true
skip_git_env_info = true
skip_rust_env_info = true

# -------------------------------------
# CI Checks
# -------------------------------------
[tasks.check]
dependencies = ["audit", "fmt", "lint", "outdated", "deps"]

[tasks.ci]
dependencies = ["lint", "standards-check", "standards-check-tight", "test", "test-docs", "doc", "vet", "outdated", "deny", "fmt"]

# Mechanical enforcement of AGENTS.md#coding-standards. Predicates live
# in `xtask/src/standards.rs`; per-file baselines in
# `scripts/standards-allowlist.toml`.
[tasks.standards-check]
command = "cargo"
args = ["run", "--quiet", "-p", "xtask", "--", "standards-check"]

# Ratchet: fail when an unrelated PR could lower a baseline without code
# changes. Run `cargo make standards-tighten` and commit the updated
# `scripts/standards-allowlist.toml` to clear.
[tasks.standards-check-tight]
command = "cargo"
args = ["run", "--quiet", "-p", "xtask", "--", "standards-check", "--check-tightenable"]

# Rewrite `scripts/standards-allowlist.toml` so every per-file baseline
# matches today's actual count. Use after a migration shrinks counts.
[tasks.standards-tighten]
command = "cargo"
args = ["run", "--quiet", "-p", "xtask", "--", "standards-check", "--tighten"]

# -------------------------------------
# Individual Actions
# -------------------------------------

# Audit
[tasks.audit]
command = "cargo"
args = ["audit"]

# Clean
[tasks.clean]
command = "cargo"
args = ["clean"]

# Deny
[tasks.deny]
command = "cargo"
args = ["deny", "--workspace", "check"]
install_crate = "cargo-deny"

# Deps
[tasks.deps]
script = '''
cargo +nightly udeps --all-targets
'''
install_crate = "cargo-udeps"

# Fmt
[tasks.fmt]
script = "cargo +nightly fmt --all"

# Lint
[tasks.lint]
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
install_crate = { rustup_component_name = "clippy" }

# Outdated
[tasks.outdated]
script = '''
cargo outdated --workspace --exit-code 1 --depth 1
'''
install_crate = "cargo-outdated"

# Test
[tasks.test]
command = "cargo"
args = ["nextest", "run", "--all", "--all-features", "--no-tests=pass"]
dependencies = ["clean"]
env = { RUSTFLAGS = "-Dwarnings" }

# Test Doc
[tasks.test-docs]
command = "cargo"
args = ["test", "--doc", "--all-features", "--workspace"]

[tasks.tools-test-fixtures]
script = '''
set -euo pipefail
CARGO_TARGET_DIR=target/tools-test-fixtures cargo build --manifest-path tests/fixtures/tools-test-project/src-rust/Cargo.toml --target wasm32-wasip2 --release --bins
mkdir -p tests/fixtures/tools-test-project/wasm tests/fixtures/tools-test-cap/wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/echo.wasm tests/fixtures/tools-test-project/wasm/echo.wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/read-only.wasm tests/fixtures/tools-test-project/wasm/read-only.wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/read-write.wasm tests/fixtures/tools-test-project/wasm/read-write.wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/read-denied.wasm tests/fixtures/tools-test-project/wasm/read-denied.wasm
wasm-tools parse tests/fixtures/tools-test-cap/src-wat/exit-seven.component.wat -o tests/fixtures/tools-test-cap/wasm/exit-seven.wasm
'''

[tasks.contract-validator-wasm]
script = '''
set -euo pipefail
cargo build -p specify-contract-validate --target wasm32-wasip2 --release
mkdir -p crates/contract-validate/dist
cp target/wasm32-wasip2/release/specify-contract-validate.wasm crates/contract-validate/dist/contract-0.2.0.wasm
shasum -a 256 crates/contract-validate/dist/contract-0.2.0.wasm
'''

[tasks.vectis-validate-wasm]
script = '''
set -euo pipefail
cargo build -p vectis-validate --target wasm32-wasip2 --release
'''

[tasks.vectis-scaffold-wasm]
script = '''
set -euo pipefail
cargo build -p vectis-scaffold --target wasm32-wasip2 --release
'''

[tasks.vectis-wasi-artifacts]
script = '''
set -euo pipefail

DIST_DIR="${VECTIS_WASI_DIST_DIR:-target/vectis-wasi-tools/release}"

cargo build -p vectis-validate -p vectis-scaffold --target wasm32-wasip2 --release --locked
mkdir -p "${DIST_DIR}"
cp target/wasm32-wasip2/release/vectis-validate.wasm "${DIST_DIR}/vectis-validate.wasm"
cp target/wasm32-wasip2/release/vectis-scaffold.wasm "${DIST_DIR}/vectis-scaffold.wasm"

(
  cd "${DIST_DIR}"
  shasum -a 256 vectis-validate.wasm > vectis-validate.wasm.sha256
  shasum -a 256 vectis-scaffold.wasm > vectis-scaffold.wasm.sha256
  shasum -a 256 vectis-validate.wasm vectis-scaffold.wasm > SHA256SUMS
)

echo "Vectis WASI artifacts written to ${DIST_DIR}"
'''

# Docs
[tasks.doc]
command = "cargo"
args = ["doc", "--no-deps", "--workspace", "--all-features", "--locked"]

# Miri
[tasks.miri]
script = '''
cargo +nightly miri setup
cargo +nightly miri nextest run --no-tests=pass
'''

# Vet
[tasks.vet]
script = '''
cargo vet regenerate imports
cargo vet regenerate exemptions
cargo vet regenerate unpublished
cargo vet --locked
'''
install_crate = "cargo-vet"

# Publish (dry-run to augentic registry)
[tasks.publish]
command = "cargo"
args = ["publish", "--registry=augentic", "--allow-dirty", "--dry-run"]

# Publish all crates to crates.io in dependency order (dry-run by default).
# Remove --dry-run to actually publish.
[tasks.publish-crates-io]
script = '''
set -e

DRY_RUN="--dry-run"
if [ "${PUBLISH_FOR_REAL}" = "true" ]; then
  DRY_RUN=""
fi

echo "=== Tier 1: No internal dependencies ==="
cargo publish -p specify-error $DRY_RUN

echo "=== Tier 2: Capability ==="
cargo publish -p specify-capability $DRY_RUN

echo "=== Tier 3: Mid-level crates ==="
cargo publish -p specify-spec $DRY_RUN
cargo publish -p specify-task $DRY_RUN
cargo publish -p specify-slice $DRY_RUN

echo "=== Tier 4: Higher-level crates ==="
cargo publish -p specify-merge $DRY_RUN
cargo publish -p specify-validate $DRY_RUN

echo "=== Tier 5: Root CLI ==="
cargo publish -p specify $DRY_RUN

echo "=== Done ==="
'''
