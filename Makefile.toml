# Install: `cargo install cargo-make`
# Help: https://sagiegurari.github.io/cargo-make/

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
default_to_workspace = true
skip_core_tasks = true
skip_crate_env_info = true
skip_git_env_info = true
skip_rust_env_info = true

# -------------------------------------
# CI Checks
# -------------------------------------
[tasks.check]
dependencies = ["fmt", "lint", "test", "test-docs", "doc"]

[tasks.ci]
dependencies = ["fmt", "lint", "test", "test-docs", "doc", "vet", "outdated", "deny"]

# -------------------------------------
# Individual Actions
# -------------------------------------

# Audit
[tasks.audit]
command = "cargo"
args = ["audit"]

# Clean
[tasks.clean]
command = "cargo"
args = ["clean"]

# Deny
[tasks.deny]
command = "cargo"
args = ["deny", "--workspace", "check"]
install_crate = "cargo-deny"

# Deps
[tasks.deps]
script = '''
cargo +nightly udeps --all-targets
'''
install_crate = "cargo-udeps"

# Fmt
[tasks.fmt]
script = "cargo +nightly fmt --all"

# Lint
[tasks.lint]
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
install_crate = { rustup_component_name = "clippy" }

# Outdated
[tasks.outdated]
script = '''
cargo outdated --workspace --exit-code 1 --depth 1
'''
install_crate = "cargo-outdated"

# Test
#
# `clean` was dropped from the dependency list (REVIEW.md B5): the
# `RUSTFLAGS=-Dwarnings` override already differs from the default
# profile, so cargo rebuilds the workspace under these flags regardless,
# making a `cargo clean` cold rebuild redundant cost on every run. The
# `vectis-wasm` fixture build is kept — some integration tests need it.
[tasks.test]
command = "cargo"
args = ["nextest", "run", "--all", "--all-features", "--no-tests=pass"]
dependencies = ["vectis-wasm"]
env = { RUSTFLAGS = "-Dwarnings" }

# Test Doc
[tasks.test-docs]
command = "cargo"
args = ["test", "--doc", "--all-features", "--workspace"]

# Docs
[tasks.doc]
command = "cargo"
args = ["doc", "--no-deps", "--workspace", "--all-features", "--locked"]
env = { RUSTDOCFLAGS = "-Dwarnings" }

# Miri
[tasks.miri]
script = '''
cargo +nightly miri setup
cargo +nightly miri nextest run --no-tests=pass
'''

# Vet
[tasks.vet]
script = '''
cargo vet regenerate imports
cargo vet regenerate exemptions
cargo vet regenerate unpublished
cargo vet --locked
'''
install_crate = "cargo-vet"

# Publish (dry-run to augentic registry)
[tasks.publish]
command = "cargo"
args = ["publish", "--registry=augentic", "--allow-dirty", "--dry-run"]


# -------------------------------------
# Auxiliary tasks
# -------------------------------------

# Build the first-party `contract` WASI tool into the sibling
# workspace's target dir. `tests/contract_tool.rs` reads the
# artifact directly from `wasi-tools/target/wasm32-wasip2/release/`,
# so this task is a precondition for that integration test.
[tasks.contract-wasm]
script = '''
set -euo pipefail
cd wasi-tools
cargo build -p specify-contract --target wasm32-wasip2 --release
'''

# Build the first-party `scenarios` framework-authoring WASI tool and
# refresh the checked-in prebuilt component embedded by
# `src/runtime/commands/lint/framework_tools.rs` (and read directly by
# the Road B scenario parity tests). Rerun this after editing
# `wasi-tools/scenarios/` so the embedded artifact reflects the new
# checks. Mirrors the `contract-wasm` pattern; the target is
# `wasm32-wasip2`.
[tasks.scenarios-wasm]
script = '''
set -euo pipefail
cd wasi-tools
cargo build -p specify-scenarios --target wasm32-wasip2 --release
cp target/wasm32-wasip2/release/specify-scenarios.wasm scenarios/dist/scenarios-0.1.0.wasm
echo "scenarios WASI component written to wasi-tools/scenarios/dist/scenarios-0.1.0.wasm"
'''

