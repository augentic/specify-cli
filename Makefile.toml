# Install: `cargo install cargo-make`
# Help: https://sagiegurari.github.io/cargo-make/

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
default_to_workspace = true
skip_core_tasks = true
skip_crate_env_info = true
skip_git_env_info = true
skip_rust_env_info = true

# -------------------------------------
# CI Checks
# -------------------------------------
[tasks.check]
dependencies = ["audit", "fmt", "lint", "outdated", "deps"]

[tasks.ci]
dependencies = ["lint", "standards", "test", "test-docs", "doc", "vet", "outdated", "deny", "fmt"]

[tasks.standards]
script = '''
cargo run --quiet -p xtask -- standards-check
cargo run --quiet -p xtask -- standards-check --check-tightenable
'''

# -------------------------------------
# Individual Actions
# -------------------------------------

# Audit
[tasks.audit]
command = "cargo"
args = ["audit"]

# Clean
[tasks.clean]
command = "cargo"
args = ["clean"]

# Deny
[tasks.deny]
command = "cargo"
args = ["deny", "--workspace", "check"]
install_crate = "cargo-deny"

# Deps
[tasks.deps]
script = '''
cargo +nightly udeps --all-targets
'''
install_crate = "cargo-udeps"

# Fmt
[tasks.fmt]
script = "cargo +nightly fmt --all"

# Lint
[tasks.lint]
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
install_crate = { rustup_component_name = "clippy" }

# Outdated
[tasks.outdated]
script = '''
cargo outdated --workspace --exit-code 1 --depth 1
'''
install_crate = "cargo-outdated"

# Test
[tasks.test]
command = "cargo"
args = ["nextest", "run", "--all", "--all-features", "--no-tests=pass"]
dependencies = ["clean"]
env = { RUSTFLAGS = "-Dwarnings" }

# Test Doc
[tasks.test-docs]
command = "cargo"
args = ["test", "--doc", "--all-features", "--workspace"]

# Docs
[tasks.doc]
command = "cargo"
args = ["doc", "--no-deps", "--workspace", "--all-features", "--locked"]
env = { RUSTDOCFLAGS = "-Dwarnings" }

# Miri
[tasks.miri]
script = '''
cargo +nightly miri setup
cargo +nightly miri nextest run --no-tests=pass
'''

# Vet
[tasks.vet]
script = '''
cargo vet regenerate imports
cargo vet regenerate exemptions
cargo vet regenerate unpublished
cargo vet --locked
'''
install_crate = "cargo-vet"

# Publish (dry-run to augentic registry)
[tasks.publish]
command = "cargo"
args = ["publish", "--registry=augentic", "--allow-dirty", "--dry-run"]


# -------------------------------------
# Move or deprecate
# -------------------------------------

# Mechanical enforcement of AGENTS.md#coding-standards. 
# Predicates live in `xtask/src/standards.rs` with per-file baselines in 
# `scripts/standards-allowlist.toml`.
#  Use:
# ```bash
# cargo make xtask standards-check
# cargo make xtask standards-check --check-tightenable
# cargo make xtask standards-check --tighten
# ```
[tasks.xtask]
command = "cargo"
args = ["run", "--quiet", "-p", "xtask", "--", "${@}"]

# Render roff man pages for the `specify` binary and every leaf
# subcommand into `target/man/` (gitignored). Release tooling picks
# the artifacts up from there.
[tasks.gen-man]
command = "cargo"
args = ["run", "--quiet", "-p", "xtask", "--", "gen-man"]

# Render shell-completion scripts for the `specify` binary into
# `target/completions/<shell>/specify.<ext>` (gitignored). Release
# tooling picks the artifacts up from there.
[tasks.gen-completions]
command = "cargo"
args = ["run", "--quiet", "-p", "xtask", "--", "gen-completions"]

[tasks.wasm-fixtures]
script = '''
set -euo pipefail
CARGO_TARGET_DIR=target/tools-test-fixtures cargo build --manifest-path tests/fixtures/tools-test-project/src-rust/Cargo.toml --target wasm32-wasip2 --release --bins
mkdir -p tests/fixtures/tools-test-project/wasm tests/fixtures/tools-test-cap/wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/echo.wasm tests/fixtures/tools-test-project/wasm/echo.wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/read-only.wasm tests/fixtures/tools-test-project/wasm/read-only.wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/read-write.wasm tests/fixtures/tools-test-project/wasm/read-write.wasm
cp target/tools-test-fixtures/wasm32-wasip2/release/read-denied.wasm tests/fixtures/tools-test-project/wasm/read-denied.wasm
wasm-tools parse tests/fixtures/tools-test-cap/src-wat/exit-seven.component.wat -o tests/fixtures/tools-test-cap/wasm/exit-seven.wasm
'''

[tasks.contract-wasm]
script = '''
set -euo pipefail
cd wasi-tools
cargo build -p specify-contract --target wasm32-wasip2 --release
mkdir -p contract/dist
cp target/wasm32-wasip2/release/specify-contract.wasm contract/dist/contract-0.2.0.wasm
shasum -a 256 contract/dist/contract-0.2.0.wasm
'''

[tasks.vectis-wasm]
script = '''
set -euo pipefail
cd wasi-tools
cargo build -p specify-vectis --target wasm32-wasip2 --release
'''

[tasks.vectis-wasi-artifacts]
script = '''
set -euo pipefail

DIST_DIR="${VECTIS_WASI_DIST_DIR:-target/vectis-wasi-tools/release}"
mkdir -p "${DIST_DIR}"
DIST_DIR_ABS="$(cd "${DIST_DIR}" && pwd)"

(
  cd wasi-tools
  cargo build -p specify-vectis --target wasm32-wasip2 --release --locked
  cp target/wasm32-wasip2/release/vectis.wasm "${DIST_DIR_ABS}/vectis.wasm"
)

(
  cd "${DIST_DIR_ABS}"
  shasum -a 256 vectis.wasm > vectis.wasm.sha256
  shasum -a 256 vectis.wasm > SHA256SUMS
)

echo "Vectis WASI artifact written to ${DIST_DIR_ABS}"
'''
