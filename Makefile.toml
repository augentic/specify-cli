# Install: `cargo install cargo-make`
# Help: https://sagiegurari.github.io/cargo-make/

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
default_to_workspace = true
skip_core_tasks = true
skip_crate_env_info = true
skip_git_env_info = true
skip_rust_env_info = true

# -------------------------------------
# CI Checks
# -------------------------------------
[tasks.check]
dependencies = ["fmt-check", "lint", "test", "test-docs", "doc"]

[tasks.ci]
dependencies = ["fmt-check", "lint", "test", "test-docs", "doc", "vet", "deny"]

# -------------------------------------
# Individual Actions
# -------------------------------------

# Audit
[tasks.audit]
command = "cargo"
args = ["audit"]

# Clean
[tasks.clean]
command = "cargo"
args = ["clean"]

# Deny
[tasks.deny]
command = "cargo"
args = ["deny", "--workspace", "check"]
install_crate = "cargo-deny"

# Deps
[tasks.deps]
script = '''
cargo +nightly udeps --all-targets
'''
install_crate = "cargo-udeps"

# Fmt (mutating; local convenience)
[tasks.fmt]
script = "cargo +nightly fmt --all"

# Fmt check (non-mutating; the gate `check` / `ci` run — a mutating
# `fmt` inside a gate silently rewrites violations instead of failing)
[tasks.fmt-check]
script = "cargo +nightly fmt --all -- --check"

# Lint
[tasks.lint]
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
install_crate = { rustup_component_name = "clippy" }

# Outdated (advisory — never part of `ci`: any upstream release would
# fail the gate for unrelated changes; run it on demand or scheduled)
[tasks.outdated]
script = '''
cargo outdated --workspace --depth 1
'''
install_crate = "cargo-outdated"

# Test
#
# `clean` is deliberately not in the dependency list: the
# `RUSTFLAGS=-Dwarnings` override already differs from the default
# profile, so cargo rebuilds the workspace under these flags regardless,
# making a `cargo clean` cold rebuild redundant cost on every run.
# Adapter-tool wasm (contract / vectis) is built in
# `augentic/specify-adapters`; the integration cases that exercise it
# self-skip in this repo.
[tasks.test]
command = "cargo"
args = ["nextest", "run", "--all", "--all-features", "--no-tests=pass"]
env = { RUSTFLAGS = "-Dwarnings" }

# Test Doc
[tasks.test-docs]
command = "cargo"
args = ["test", "--doc", "--all-features", "--workspace"]

# Docs
[tasks.doc]
command = "cargo"
args = ["doc", "--no-deps", "--workspace", "--all-features", "--locked"]
env = { RUSTDOCFLAGS = "-Dwarnings" }

# Miri
[tasks.miri]
script = '''
cargo +nightly miri setup
cargo +nightly miri nextest run --no-tests=pass
'''

# Vet (check only — regeneration before checking would auto-exempt
# anything unaudited and the gate could never fail)
[tasks.vet]
script = '''
cargo vet --locked
'''
install_crate = "cargo-vet"

# Vet regenerate (manual, on dependency add/update — refresh imports and
# exemptions, then review the `supply-chain/` diff before committing)
[tasks.vet-regenerate]
script = '''
cargo vet regenerate imports
cargo vet regenerate exemptions
cargo vet regenerate unpublished
'''
install_crate = "cargo-vet"

# Publish (dry-run to augentic registry)
[tasks.publish]
command = "cargo"
args = ["publish", "--registry=augentic", "--allow-dirty", "--dry-run"]


# -------------------------------------
# Auxiliary tasks
# -------------------------------------

